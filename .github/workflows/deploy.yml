name: Deploy to AWS

on:
  push:
    branches: [main, master]
  workflow_dispatch:  # Manual trigger

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      
      - name: Verify AWS credentials
        run: |
          aws sts get-caller-identity
          echo "✅ AWS credentials valid"
      
      - name: Build SAM application
        run: |
          sam build --use-container
          echo "✅ Build complete"
      
      - name: Deploy to AWS
        run: |
          sam deploy \
            --stack-name obsidian-wiki \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --capabilities CAPABILITY_IAM \
            --region ${{ secrets.AWS_REGION }} \
            --parameter-overrides \
              UseBedrock=false \
              OpenAIModel=gpt-4o-mini \
              SearchApiSecretArn=arn:aws:secretsmanager:us-east-1:307657261121:secret:obsidian-vault/search-keys-6ZrlP7 \
              WebsearchEnabled=true \
              MaxQueries=3 \
              MaxSnippets=8
          echo "✅ Deploy complete"
      
      - name: Test deployment
        run: |
          echo "Testing Lambda function..."
          aws s3 cp examples/platon2.md "s3://obsidian-wiki-307657261121-obsidian-wiki/raw/test-ci-$(date +%s).md"
          sleep 30
          aws s3 ls s3://obsidian-wiki-307657261121-obsidian-wiki/wiki/
